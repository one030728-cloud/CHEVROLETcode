<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>쉐보레 포스모스 · 관리자</title>
<style>
  * { box-sizing: border-box; }
  :root {
    --blue: #3182f6;
    --blue-dark: #1b64da;
    --blue-tint: #eef4ff;
    --ink: #191f28;
    --muted: #8b95a1;
    --border: #e5e8eb;
    --surface: #f2f4f6;
    --error: #f04452;
    --green: #12b76a;
  }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Malgun Gothic", sans-serif;
    background: var(--surface);
    color: var(--ink);
  }
  .top {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .top h1 {
    font-size: 17px;
    font-weight: 700;
    margin: 0;
  }
  .top .actions { display: flex; gap: 8px; align-items: center; }
  .top button, .top .status {
    font-size: 13px;
  }
  #login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #login-card {
    width: 100%;
    max-width: 360px;
    background: #fff;
    border-radius: 20px;
    padding: 32px 24px;
  }
  #login-card h1 {
    font-size: 19px;
    margin: 0 0 4px;
  }
  #login-card p {
    font-size: 14px;
    color: var(--muted);
    margin: 0 0 20px;
  }
  input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    background: var(--surface);
    border: 1.5px solid transparent;
    border-radius: 12px;
    outline: none;
    margin-bottom: 10px;
  }
  input[type="password"]:focus { border-color: var(--blue); background: #fff; }
  button {
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 700;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: var(--blue);
    color: #fff;
  }
  button:hover { background: var(--blue-dark); }
  button.ghost {
    background: transparent;
    color: var(--muted);
    font-weight: 600;
    border: 1px solid var(--border);
  }
  button.ghost:hover { background: var(--surface); color: var(--ink); }
  button:disabled { background: var(--border); color: #b0b8c1; cursor: not-allowed; }
  .err { color: var(--error); font-size: 13px; min-height: 18px; margin: 0 0 6px; }
  main { max-width: 900px; margin: 0 auto; padding: 20px; display: none; }
  .callnext {
    background: #fff;
    border-radius: 16px;
    padding: 18px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .callnext div { font-size: 14px; color: var(--muted); }
  .callnext button { white-space: nowrap; }
  .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 10px;
    background: #fff;
    color: var(--muted);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    border: 1px solid var(--border);
  }
  .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .section { background: #fff; border-radius: 16px; padding: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .badge.waiting { background: var(--blue-tint); color: var(--blue); }
  .badge.called, .badge.receipt_sent { background: #e7f9f1; color: var(--green); }
  .badge.notify_failed, .badge.receipt_failed { background: #fdeeef; color: var(--error); }
  .badge.requested { background: var(--surface); color: var(--muted); }
  .empty { padding: 40px 12px; text-align: center; color: var(--muted); font-size: 14px; }
  .refresh-note { font-size: 12px; color: var(--muted); margin: 10px 2px 0; }
</style>
</head>
<body>

<div id="login-wrap">
  <div id="login-card">
    <h1>관리자 로그인</h1>
    <p>ADMIN_TOKEN 값을 입력하세요.</p>
    <input type="password" id="token-input" placeholder="관리자 토큰" autocomplete="off" />
    <div class="err" id="login-err"></div>
    <button id="login-btn" style="width:100%">로그인</button>
  </div>
</div>

<div class="top" id="top-bar" style="display:none">
  <h1>쉐보레 포스모스 · 관리자</h1>
  <div class="actions">
    <span class="status" id="conn-status"></span>
    <button class="ghost" id="logout-btn">로그아웃</button>
  </div>
</div>

<main id="main">
  <div class="callnext">
    <div id="callnext-info">대기중인 다음 손님을 호출하고 순서 알림을 보냅니다.</div>
    <button id="callnext-btn">다음 손님 호출</button>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="reservations">예약 (<span id="count-res">0</span>)</div>
    <div class="tab" data-tab="payments">결제 (<span id="count-pay">0</span>)</div>
  </div>

  <div class="section">
    <div id="reservations-view"></div>
    <div id="payments-view" style="display:none"></div>
  </div>
  <div class="refresh-note">15초마다 자동 새로고침됩니다.</div>
</main>

<script>
const STATUS_LABEL = {
  waiting: '대기중',
  called: '호출완료',
  notify_failed: '알림실패',
  requested: '결제접수',
  receipt_sent: '영수증발송',
  receipt_failed: '영수증실패',
}

let token = sessionStorage.getItem('admin_token') || ''
let currentTab = 'reservations'
let pollTimer = null

const loginWrap = document.getElementById('login-wrap')
const topBar = document.getElementById('top-bar')
const main = document.getElementById('main')
const tokenInput = document.getElementById('token-input')
const loginBtn = document.getElementById('login-btn')
const loginErr = document.getElementById('login-err')
const logoutBtn = document.getElementById('logout-btn')
const connStatus = document.getElementById('conn-status')
const callnextBtn = document.getElementById('callnext-btn')
const callnextInfo = document.getElementById('callnext-info')

function fmtDate(iso) {
  if (!iso) return '-'
  const d = new Date(iso)
  return d.toLocaleString('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
}

function fmtAmount(n) {
  if (n === null || n === undefined) return '-'
  return Number(n).toLocaleString('ko-KR') + '원'
}

async function api(path) {
  const res = await fetch(path, { headers: { 'x-admin-token': token } })
  if (res.status === 401) throw new Error('UNAUTHORIZED')
  if (!res.ok) throw new Error('요청 실패 (' + res.status + ')')
  return res.json()
}

async function apiPost(path) {
  const res = await fetch(path, { method: 'POST', headers: { 'x-admin-token': token } })
  const body = await res.json().catch(() => ({}))
  if (res.status === 401) throw new Error('UNAUTHORIZED')
  return { ok: res.ok, status: res.status, body }
}

function showApp() {
  loginWrap.style.display = 'none'
  topBar.style.display = 'flex'
  main.style.display = 'block'
  loadAll()
  if (pollTimer) clearInterval(pollTimer)
  pollTimer = setInterval(loadAll, 15000)
}

function showLogin(message) {
  loginWrap.style.display = 'flex'
  topBar.style.display = 'none'
  main.style.display = 'none'
  if (pollTimer) clearInterval(pollTimer)
  if (message) loginErr.textContent = message
}

async function tryLogin(inputToken) {
  token = inputToken
  try {
    await api('/api/reservations')
    sessionStorage.setItem('admin_token', token)
    loginErr.textContent = ''
    showApp()
  } catch (e) {
    token = ''
    sessionStorage.removeItem('admin_token')
    showLogin('토큰이 올바르지 않습니다.')
  }
}

loginBtn.addEventListener('click', () => {
  const v = tokenInput.value.trim()
  if (!v) return
  tryLogin(v)
})
tokenInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') loginBtn.click()
})
logoutBtn.addEventListener('click', () => {
  sessionStorage.removeItem('admin_token')
  token = ''
  showLogin('')
})

document.querySelectorAll('.tab').forEach((tab) => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'))
    tab.classList.add('active')
    currentTab = tab.dataset.tab
    document.getElementById('reservations-view').style.display = currentTab === 'reservations' ? 'block' : 'none'
    document.getElementById('payments-view').style.display = currentTab === 'payments' ? 'block' : 'none'
  })
})

function renderReservations(list) {
  const view = document.getElementById('reservations-view')
  document.getElementById('count-res').textContent = list.length
  if (!list.length) {
    view.innerHTML = '<div class="empty">예약 내역이 없습니다.</div>'
    return
  }
  const rows = list.map((r) => `
    <tr>
      <td>#${r.queueNumber}</td>
      <td>${escapeHtml(r.carNumber)}</td>
      <td>${escapeHtml(r.phone)}</td>
      <td><span class="badge ${r.status}">${STATUS_LABEL[r.status] || r.status}</span></td>
      <td>${fmtDate(r.createdAt)}</td>
    </tr>
  `).join('')
  view.innerHTML = `<table>
    <thead><tr><th>순번</th><th>차량번호</th><th>전화번호</th><th>상태</th><th>접수시간</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`
}

function renderPayments(list) {
  const view = document.getElementById('payments-view')
  document.getElementById('count-pay').textContent = list.length
  if (!list.length) {
    view.innerHTML = '<div class="empty">결제 내역이 없습니다.</div>'
    return
  }
  const rows = list.map((p) => `
    <tr>
      <td>${escapeHtml(p.carNumber || '-')}</td>
      <td>${escapeHtml(p.phone)}</td>
      <td>${fmtAmount(p.amount)}</td>
      <td><span class="badge ${p.status}">${STATUS_LABEL[p.status] || p.status}</span></td>
      <td>${p.promoSent ? '발송완료' : fmtDate(p.promoAt)}</td>
      <td>${fmtDate(p.createdAt)}</td>
    </tr>
  `).join('')
  view.innerHTML = `<table>
    <thead><tr><th>차량번호</th><th>전화번호</th><th>결제금액</th><th>상태</th><th>프로모션</th><th>결제시간</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]))
}

async function loadAll() {
  try {
    const [resData, payData] = await Promise.all([api('/api/reservations'), api('/api/payments')])
    renderReservations(resData.reservations)
    renderPayments(payData.payments)
    connStatus.textContent = ''
    updateCallnextInfo(resData.reservations)
  } catch (e) {
    if (e.message === 'UNAUTHORIZED') {
      sessionStorage.removeItem('admin_token')
      showLogin('토큰이 만료되었거나 올바르지 않습니다.')
    } else {
      connStatus.textContent = '연결 오류'
    }
  }
}

function updateCallnextInfo(reservations) {
  const waiting = reservations.filter((r) => r.status === 'waiting')
  callnextInfo.textContent = waiting.length
    ? `대기중 ${waiting.length}건 · 다음 순번 #${[...waiting].sort((a, b) => a.queueNumber - b.queueNumber)[0].queueNumber}`
    : '대기중인 예약이 없습니다.'
  callnextBtn.disabled = waiting.length === 0
}

callnextBtn.addEventListener('click', async () => {
  callnextBtn.disabled = true
  callnextBtn.textContent = '호출 중...'
  try {
    const { ok, body } = await apiPost('/api/queue/call-next')
    if (!ok) {
      alert(body.error || '호출에 실패했습니다.')
    }
    await loadAll()
  } catch (e) {
    if (e.message === 'UNAUTHORIZED') {
      sessionStorage.removeItem('admin_token')
      showLogin('토큰이 만료되었거나 올바르지 않습니다.')
    } else {
      alert('호출 중 오류가 발생했습니다.')
    }
  } finally {
    callnextBtn.textContent = '다음 손님 호출'
  }
})

if (token) {
  tryLogin(token)
} else {
  showLogin('')
}
</script>
</body>
</html>
